<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  
  <!-- 1. Fondo Vibrante y Sólido (Verde Marca - Resalta en cualquier wallpaper) -->
  <circle cx="256" cy="256" r="256" fill="#00A859" />

  <!-- 2. Ondas de Conectividad (Masivas, blancas, ocupando el borde superior) -->
  <path d="M 120 130 A 200 200 0 0 1 392 130" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" opacity="0.5" />
  <path d="M 176 190 A 130 130 0 0 1 336 190" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" />

  <!-- 3. El Bus (Escalado al DOBLE de tamaño, color Azul Marino Corporativo) -->
  <!-- Chasis principal masivo -->
  <rect x="136" y="240" width="240" height="180" rx="36" fill="#14274E" />
  
  <!-- Parabrisas gigante (Blanco para dar altísimo contraste) -->
  <rect x="166" y="270" width="180" height="72" rx="16" fill="#FFFFFF" />
  
  <!-- Detalle del vidrio (Un pequeño reflejo azul) -->
  <rect x="290" y="270" width="30" height="72" fill="#14274E" opacity="0.1" />

  <!-- Faros (Amarillo alerta/transporte) -->
  <circle cx="180" cy="375" r="16" fill="#FFC107" />
  <circle cx="332" cy="375" r="16" fill="#FFC107" />
  
  <!-- Llantas (Sobresaliendo con fuerza abajo) -->
  <rect x="160" y="410" width="32" height="24" rx="8" fill="#0A1428" />
  <rect x="320" y="410" width="32" height="24" rx="8" fill="#0A1428" />

</svg>