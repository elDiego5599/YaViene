name: ya_viene_pasajero
description: Aplicación de seguimiento de transporte público en tiempo real - Barranquilla.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking & Real-time
  socket_io_client: ^2.0.3+1
  mqtt_client: ^10.2.1
  dio: ^5.4.3+1

  # Local Storage
  shared_preferences: ^2.3.1
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI & Maps
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  logger: ^2.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/icons/
