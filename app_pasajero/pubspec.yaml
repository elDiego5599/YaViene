name: ya_viene_pasajero
description: Aplicación de seguimiento de transporte público en tiempo real - Barranquilla.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Paquetes Locales (Monorepo) ─────────────────────────────────────────────
  ya_viene_core:
    path: ../ya_viene_core

  # ── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Mapa (Motor nativo MapLibre GL — Open Source sin llaves)
  maplibre_gl: ^0.26.1

  # ── Networking & Real-time ────────────────────────────────────────────────────
  # NOTA: El pasajero SOLO consume via WebSocket (lectura). NO hay MQTT.
  # Zero Trust: el broker MQTT solo acepta PUBLISH de conductores autenticados.
  socket_io_client: ^2.0.3+1
  dio: ^5.4.3+1

  # ── Local Storage ─────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.1
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── UI ────────────────────────────────────────────────────────────────────────
  # NOTA: SIN google_fonts. Las fuentes Inter se registran nativamente en la
  # sección `flutter.fonts` de este archivo y se leen del bundle de la app.
  # Esto elimina el FOUT (Flash of Unstyled Text) y la dependencia de red.
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.1.0

  # ── Firebase ──────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # ── Utilities ─────────────────────────────────────────────────────────────────
  equatable: ^2.0.5
  intl: ^0.19.0
  logger: ^2.4.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.13
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_native_splash:
  color: "#00A859"
  image: "assets/icon/ic_launcher_foreground.png"
  android_12:
    image: "assets/icon/ic_launcher_foreground.png"
    icon_background_color: "#00A859"
    color: "#00A859"
