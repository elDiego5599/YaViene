name: ya_viene_core
description: Core compartido del sistema Ya Viene (Modelos, Temas, Providers Base).
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  equatable: ^2.0.5
  intl: ^0.19.0
  google_fonts: ^6.1.0

# ── Importante: El core no debe depender de MapLibre, Mapbox o MQTT directamente.
# Es estrictamente para modelos de dominio puros y el sistema de diseño visual.
