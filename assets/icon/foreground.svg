  <path d="M 210 220 A 70 70 0 0 1 302 220" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" />

  <!-- EL BUS (Escalado y centrado milimétricamente) -->
  <!-- Chasis -->
  <rect x="166" y="250" width="180" height="120" rx="24" fill="#14274E" />
  
  <!-- Parabrisas panorámico -->
  <rect x="186" y="270" width="140" height="48" rx="10" fill="#FFFFFF" />
  <!-- Reflejo del vidrio -->
  <rect x="286" y="270" width="20" height="48" fill="#14274E" opacity="0.1" />

  <!-- Faros amarillos -->
  <circle cx="196" cy="340" r="12" fill="#FFC107" />
  <circle cx="316" cy="340" r="12" fill="#FFC107" />
  
  <!-- Llantas (Ahora sí están bien arriba del borde de corte) -->
  <rect x="186" y="360" width="24" height="20" rx="6" fill="#0A1428" />
  <rect x="302" y="360" width="24" height="20" rx="6" fill="#0A1428" />
