<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8ecf1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 48px;
    padding: 60px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .badge {
    background: #f1f4f9;
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .icon-wrap {
    padding: 32px;
    border-radius: 40px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .desc {
    color: #475569;
    font-size: 14px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">Ya Viene — App Icon</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 512 512" width="280" height="280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="routeGrad" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00FA9A" stop-opacity="1"/>
            <stop offset="100%" stop-color="#27272A" stop-opacity="0.2"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="115" fill="#09090B" />
        <path d="M 120 392 C 120 180, 392 400, 392 120" fill="none" stroke="url(#routeGrad)" stroke-width="56" stroke-linecap="round" />
        
        <circle cx="120" cy="392" r="64" fill="#FFFFFF" opacity="0.12" />
        <circle cx="120" cy="392" r="28" fill="none" stroke="#D4D4D8" stroke-width="14" />
        <circle cx="120" cy="392" r="6" fill="#D4D4D8" opacity="0.9" />
        
        <circle cx="392" cy="120" r="64" fill="#00FA9A" opacity="0.15" />
        <circle cx="392" cy="120" r="28" fill="#00FA9A" />
        <circle cx="392" cy="120" r="12" fill="#FFFFFF" />
      </svg>
    </div>
    <div class="desc">
      ○ Tú esperando · Curva = la ruta · 🟢 Bus acercándose
    </div>
  </div>
</body>
</html>
