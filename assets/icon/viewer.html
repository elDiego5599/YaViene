<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #e8ecf1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, system-ui, sans-serif;
  }
  .card {
    background: #fff;
    border-radius: 48px;
    padding: 60px;
    box-shadow: 0 8px 48px rgba(0,0,0,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .badge {
    background: #f1f4f9;
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .icon-wrap {
    padding: 32px;
    border-radius: 40px;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="badge">Ya Viene — App Icon</span>
    <div class="icon-wrap">
      <svg viewBox="0 0 512 512" width="280" height="280" xmlns="http://www.w3.org/2000/svg">
        <circle cx="256" cy="256" r="256" fill="#00A859" />
        <path d="M 120 130 A 200 200 0 0 1 392 130" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" opacity="0.5" />
        <path d="M 176 190 A 130 130 0 0 1 336 190" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" />
        <rect x="136" y="240" width="240" height="180" rx="36" fill="#14274E" />
        <rect x="166" y="270" width="180" height="72" rx="16" fill="#FFFFFF" />
        <rect x="290" y="270" width="30" height="72" fill="#14274E" opacity="0.1" />
        <circle cx="180" cy="375" r="16" fill="#FFC107" />
        <circle cx="332" cy="375" r="16" fill="#FFC107" />
        <rect x="160" y="410" width="32" height="24" rx="8" fill="#0A1428" />
        <rect x="320" y="410" width="32" height="24" rx="8" fill="#0A1428" />
      </svg>
    </div>
  </div>
</body>
</html>
